services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - shared

  publisher:
    build:
      context: .
      dockerfile: Dockerfile.pub
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://odoo:odoo@host.docker.internal:5432/odoo?sslmode=disable}
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
    depends_on:
      - rabbitmq
    networks:
      - shared

networks:
  shared:
    name: attendance19_shared
