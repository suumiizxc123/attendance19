services:
  db-pub:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata-pub:/var/lib/postgresql/data
      - ./init.pub.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5672:5672"
      - "15672:15672"
      - "1883:1883"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf

  publisher:
    build:
      context: .
      dockerfile: Dockerfile.pub
    environment:
      DATABASE_URL: postgres://app:app@db-pub:5432/appdb?sslmode=disable
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
    depends_on:
      - db-pub
      - rabbitmq

volumes:
  pgdata-pub:
